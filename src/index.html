<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'">
    <title>Sideline to Sideline Football</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #0a1120; overflow: hidden; }

      #splash {
        position: fixed; inset: 0;
        background: #0a1120;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease;
      }
      #splash.fade-out { opacity: 0; pointer-events: none; }

      .splash-badge {
        font-family: monospace; font-size: 11px; letter-spacing: 4px;
        color: #FF8740; border: 1px solid #FF8740;
        padding: 4px 14px; border-radius: 2px; margin-bottom: 28px;
      }
      .splash-title-top {
        font-family: monospace; font-size: 13px; letter-spacing: 6px;
        color: #94a3b8; text-transform: uppercase; margin-bottom: 6px;
      }
      .splash-title-main {
        font-family: monospace; font-size: 36px; font-weight: bold;
        letter-spacing: 4px; color: #f1f5f9; text-transform: uppercase;
        margin-bottom: 4px;
      }
      .splash-title-sub {
        font-family: monospace; font-size: 16px; letter-spacing: 8px;
        color: #FF8740; text-transform: uppercase; margin-bottom: 48px;
      }
      .splash-bar-wrap {
        width: 220px; height: 2px; background: #1e293b; border-radius: 1px; overflow: hidden;
      }
      .splash-bar-fill {
        height: 100%; width: 0%; background: #FF8740; border-radius: 1px;
        animation: loadbar 1.4s ease-out forwards;
      }
      .splash-loading {
        font-family: monospace; font-size: 9px; letter-spacing: 3px;
        color: #475569; margin-top: 14px;
      }

      @keyframes loadbar {
        0%   { width: 0%; }
        60%  { width: 75%; }
        85%  { width: 90%; }
        100% { width: 100%; }
      }
    </style>
  </head>
  <body>

    <div id="splash">
      <div class="splash-badge">S2S</div>
      <div class="splash-title-top">Dynasty Simulator</div>
      <div class="splash-title-main">Sideline to</div>
      <div class="splash-title-main">Sideline</div>
      <div class="splash-title-sub">Football</div>
      <div class="splash-bar-wrap">
        <div class="splash-bar-fill"></div>
      </div>
      <div class="splash-loading">LOADING...</div>
    </div>

    <script>
      // Remove splash once React is ready
      window.__hideSplash = function () {
        var el = document.getElementById('splash');
        if (!el) return;
        el.classList.add('fade-out');
        setTimeout(function () { el.remove(); }, 520);
      };
    </script>
  </body>
</html>
