name: Windows Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test (Windows x64)
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node.js setup ────────────────────────────────────────────────────
      # Electron 42 bundles Node 22; match the host version so ABI
      # numbers align when better-sqlite3 compiles during npm ci.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # ── Install ──────────────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── Unit tests ───────────────────────────────────────────────────────
      # Vitest runs in Node (not Electron), so the plain npm-ci binary works.
      - name: Run Vitest tests
        run: npm test

      # ── Package (Electron Forge make) ────────────────────────────────────
      # Forge rebuilds better-sqlite3 for Electron automatically via
      # AutoUnpackNativesPlugin before packing the asar.
      - name: Build Windows installer
        run: npm run make -- --platform win32 --arch x64

      # ── Upload artifact ──────────────────────────────────────────────────
      - name: Upload Squirrel installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-${{ github.sha }}
          path: out/make/squirrel.windows/x64/
          retention-days: 14
          if-no-files-found: error
